      var requested = String(params.get("visual") || params.get("slug") || "").trim().toLowerCase();
      var destination = slugs.indexOf(requested) >= 0
        ? "/visuals/" + encodeURIComponent(requested) + "/"
        : "/#visual-studies";
      window.location.replace(destination);
    })();
  </script>
