  <title>Selected Project — Ahmad Alhadidii</title>

  <script src="content.js"></script>
  <script>
    (function () {
      var root = document.documentElement;
      var params = new URLSearchParams(window.location.search);
      var key = params.get("project") || params.get("slug") || params.get("id") || "";
      var normalizedKey = String(key).trim().toLowerCase();
      var projects = window.siteContent && Array.isArray(window.siteContent.projects)
        ? window.siteContent.projects
        : [];
      var project = projects.find(function (item, index) {
        return [
          item.slug,
          item.id,
          item.number,
          String(index + 1),
          String(index + 1).padStart(2, "0")
        ].some(function (alias) {
          return String(alias || "").trim().toLowerCase() === normalizedKey;
        });
      });
      var theme = project && project.theme === "manmatic" ? "manmatic" : "light";
      var themeColor = document.querySelector('meta[name="theme-color"]');

      root.classList.remove("no-js");
      root.classList.add("js");
      root.dataset.initialTheme = theme;
      if (themeColor) themeColor.setAttribute("content", theme === "manmatic" ? "#0a0a0a" : "#ffffff");
    })();
  </script>

  <style>
    html, body, main { background: #ffffff; color: #111111; }
    html[data-initial-theme="manmatic"],
    html[data-initial-theme="manmatic"] body,
    html[data-initial-theme="manmatic"] main { background: #0a0a0a; color: #f2f2f2; }
  </style>

  <script src="assets/js/project.js" defer></script>
